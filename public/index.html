<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARIA | 公式サイト</title>
  <meta name="description" content="一人で、千人分。— Dolby Atmos 時代のAIソロシンガー ARIA の公式サイト。最新リリース、歌詞、ストーリー、ブログ情報をお届けします。" />
  <link rel="canonical" href="https://arianexus.org/" />

  <!-- Language alternates -->
  <link rel="alternate" hreflang="ja" href="https://arianexus.org/"/>
  <link rel="alternate" hreflang="en" href="https://arianexus.org/en/"/>
  <link rel="alternate" hreflang="zh" href="https://arianexus.org/zh/"/>
  <link rel="alternate" hreflang="x-default" href="https://arianexus.org/"/>

  <!-- Preconnect/DNS Prefetch -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/style.css" />

  <!-- Preload hero image -->
  <link rel="preload" as="image" href="/assets/img/aria-hero.png" imagesizes="100vw">
</head>
<body class="body--cosmic">
  <!-- 共通ヘッダー（パーシャル） -->
  <div data-include="/partials/header.html"></div>

  <!-- ================= Hero (image only) ================= -->
  <section class="hero-visual" aria-label="Hero visual">
    <picture class="hero-img">
      <!-- PNGのみ（将来 avif/webp 追加可） -->
      <img src="/assets/img/aria-hero.png" alt="" width="3840" height="1920" decoding="async" fetchpriority="high">
    </picture>

    <!-- 光の被せ（読みやすさ確保） -->
    <div class="hero-overlay"></div>

    <!-- テキスト -->
    <div class="hero-content container">
      <h1 class="hero-title">一人で、千人分。<span class="brand">ARIA</span></h1>
      <p class="muted">Dolby Atmos ネイティブのAIソロシンガー。多言語 × 7オクターブ × 立体フック。</p>

      <!-- CTA帯（後でプレイヤーに差し替え） -->
      <div class="card hero-cta">
        （ここに YouTube / Spotify / Apple Music 等の埋め込みを配置）
      </div>
    </div>
  </section>

  <!-- ================= Main ================= -->
  <main>
    <section id="listen" class="placeholder container" aria-label="楽曲を聴く" style="margin-top:40px;">
      <!-- 上のCTAに集約するならこのセクションは削ってOK -->
    </section>

    <section id="music" class="placeholder container" aria-label="楽曲" style="margin-top:56px;">
      <h2>楽曲</h2>
      <p class="muted">最新曲や人気曲をここに並べます。</p>
    </section>

    <section id="lyrics" class="placeholder container" aria-label="歌詞" style="margin-top:56px;">
      <h2>歌詞</h2>
      <p class="muted">各曲の歌詞ページへ誘導します。</p>
    </section>

    <section id="story" class="placeholder container" aria-label="ストーリー" style="margin-top:56px;">
      <h2>ストーリー</h2>
      <p class="muted">ARIA の世界観・設定・人物像などを深掘り。</p>
    </section>

    <section id="blog" class="placeholder container" aria-label="ブログ" style="margin-top:56px;">
      <h2>ブログ</h2>
      <p class="muted">最新記事をここに表示。</p>
    </section>

    <section id="contact" class="placeholder container" aria-label="お問い合わせ" style="margin-top:56px;">
      <h2>お問い合わせ</h2>
      <p class="muted">コラボや取材依頼などの窓口。</p>
    </section>
  </main>

  <!-- Scripts（パーシャル読込／既存のメインJS） -->
  <script src="/assets/js/includes.js" defer></script>
  <script src="/assets/js/main.js" defer></script>
  <noscript>JavaScript を有効にするとヘッダー等の共通部品が読み込まれます。</noscript>
</body>
</html>
