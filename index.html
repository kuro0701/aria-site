<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        /* 基本設定と色の定義 */
        :root {
            --bg-color: #121212;
            --player-bg: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-color: #a747f7;
            --button-bg: #414141;
            --button-red: #e53935;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 音楽プレイヤー全体のコンテナ */
        .music-player {
            background-color: var(--player-bg);
            border-radius: 16px;
            overflow: hidden;
            width: 100%;
            max-width: 350px; /* スマホでの最大幅 */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* === 1. 背景画像の修正 === */
        /* 画像コンテナ */
        .artwork-container {
            width: 100%;
            position: relative;
            padding-top: 100%; /* 正方形を維持 */
        }

        /* 画像 */
        .artwork-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 画像の比率を維持したまま、コンテナ全体を覆うように調整します。
              これが潰れを防ぐための重要なプロパティです。
            */
            object-fit: cover; 
            border-radius: 8px;
        }
        
        /* 曲情報とコントロールのコンテナ */
        .player-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        
        /* 曲名とアーティスト */
        .track-info {
            text-align: center;
            margin-bottom: 24px;
        }

        .track-info h2 {
            font-size: 20px;
            margin: 0 0 4px 0;
            font-weight: 600;
        }

        .track-info p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
        }

        /* 再生コントロール */
        .playback-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }

        .play-button {
            background-color: var(--accent-color);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .play-button svg {
            width: 28px;
            height: 28px;
            fill: var(--text-primary);
        }

        /* シークバー */
        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: #4d4d4d;
            border-radius: 2px;
            cursor: pointer;
        }

        /* その他のコントロール (仮) */
        .other-controls {
            margin-top: 24px;
            margin-bottom: 24px;
        }
        .control-slider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 12px;
        }
        .control-slider input[type="range"] {
            flex-grow: 1;
        }

        /* 下部のボタン */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto; /* 残りのスペースを埋める */
        }
        
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--button-bg);
            color: var(--text-primary);
        }

        .btn-danger {
            background-color: var(--button-red);
            color: var(--text-primary);
        }


        /* === 2. PC版レイアウト (横長) === */
        /* 画面幅が768px以上の場合に適用 */
        @media screen and (min-width: 768px) {
            .music-player {
                flex-direction: row; /* 横並びに変更 */
                max-width: 800px; /* PCでの最大幅を広げる */
                height: 300px; /* 高さを固定 */
            }

            .artwork-container {
                width: 300px; /* 画像コンテナの幅を固定 */
                height: 300px;
                padding-top: 0; /* 正方形維持のpaddingをリセット */
                flex-shrink: 0; /* コンテナが縮まないようにする */
            }
            
            .artwork-image {
                border-radius: 0; /* PC版では角丸をなくす (デザインによる) */
            }

            .player-content {
                justify-content: center; /* 中央揃えにする */
                padding: 32px;
            }
            
            .track-info {
                text-align: left; /* テキストを左揃えに */
            }
        }

    </style>
</head>
<body>

    <div class="music-player">
        <div class="artwork-container">
            <img class="artwork-image" src="https://picsum.photos/seed/music/600/600" alt="Album Art">
        </div>

        <div class="player-content">
            <div class="track-info">
                <h2>Broken-Hearted</h2>
                <p>Ujico*/Snail's House</p>
            </div>

            <div class="playback-controls">
                <button class="play-button" aria-label="Play/Pause">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"></path>
                    </svg>
                </button>
            </div>

            <div class="progress-bar">
                </div>

            <div class="other-controls">
                <div class="control-slider">
                    <span>LOW</span>
                    <input type="range" min="0" max="100" value="50">
                    <span>HIGH</span>
                </div>
                 <div class="control-slider">
                    <span>VOCAL</span>
                    <input type="range" min="0" max="100" value="70">
                    <span>INST</span>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary">DOWNLOAD</button>
                <button class="btn btn-danger">SUBSCRIBE</button>
            </div>
        </div>
    </div>

</body>
</html>
