<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARIA | AIソロシンガー</title>
  <meta name="description" content="AIソロシンガー ARIA（アリア）の公式サイト。最新リリース、歌詞、ストーリー、ブログ情報をお届けします。" />
  <meta name="theme-color" content="#0B0B0C" />
  <link rel="icon" type="image/png" href="/assets/img/favicon.png" />

  <!-- Fonts (必要なら削除可) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Header styles -->
  <link rel="stylesheet" href="/assets/css/header.css" />
</head>
<body>
  <!-- ====== Header: Atmos Halo ====== -->
  <header class="aria-header" role="banner">
    <div class="aria-header__inner">
      <nav class="aria-nav" aria-label="メイン">
        <!-- モバイル: ハンバーガー -->
        <button class="aria-nav__toggle" aria-label="メニューを開く" aria-expanded="false">
          <img class="aria-nav__toggle-icon" src="/assets/img/icon-menu.png" width="24" height="24" alt="">
        </button>

        <!-- 左ナビ -->
        <ul class="aria-nav__list aria-nav__list--left">
          <li><a href="#music">MUSIC</a></li>
          <li><a href="#lyrics">LYRICS</a></li>
        </ul>

        <!-- センター：ロゴ -->
        <a class="aria-logo" href="/" aria-label="ARIA Home">
          <img src="/assets/img/aria-wordmark.png" width="160" height="32" alt="ARIA">
        </a>

        <!-- 右ナビ -->
        <ul class="aria-nav__list aria-nav__list--right">
          <li><a href="#story">STORY</a></li>
          <li><a href="#blog">BLOG</a></li>
        </ul>

        <!-- CTA + 言語 -->
        <div class="aria-cta">
          <a class="aria-cta__btn" href="#listen">
            <img src="/assets/img/icon-play.png" width="18" height="18" alt=""> 最新リリースを聴く
          </a>
          <div class="aria-lang" role="navigation" aria-label="言語切替">
            <a href="/"><img src="/assets/img/flag-ja.png" width="20" height="14" alt="日本語"></a>
            <a href="/en/"><img src="/assets/img/flag-en.png" width="20" height="14" alt="English"></a>
            <a href="/zh/"><img src="/assets/img/flag-zh.png" width="20" height="14" alt="中文"></a>
          </div>
        </div>
      </nav>

      <!-- サブキャッチ（PCのみ表示）-->
      <p class="aria-subcopy" aria-hidden="true">一人で、千人分。</p>
    </div>
  </header>

  <!-- ====== 以下は動作確認用のダミーセクション（後で差し替えOK） ====== -->
  <main>
    <section id="music" class="dummy"> <h2>MUSIC</h2> <p>楽曲の一覧や埋め込みを配置。</p> </section>
    <section id="lyrics" class="dummy"> <h2>LYRICS</h2> <p>歌詞ページへの導線。</p> </section>
    <section id="story" class="dummy"> <h2>STORY</h2> <p>ARIAの世界観・設定。</p> </section>
    <section id="blog" class="dummy"> <h2>BLOG</h2> <p>最新記事一覧。</p> </section>
    <section id="listen" class="dummy"> <h2>LISTEN</h2> <p>Spotify/YouTube などのリンク。</p> </section>
  </main>

  <noscript>JavaScript が無効です。モバイルメニューの開閉が動作しません。</noscript>
  <script defer src="/assets/js/header.js"></script>
</body>
</html>
