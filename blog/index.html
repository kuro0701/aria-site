<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARIA | ブログ</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="page-blog">
  <header class="navbar">
    <div class="container">
      <a class="logo" href="/">ARIA</a>
      <nav class="nav">
        <a href="/">ホーム</a>
        <a href="/#music">音楽</a>
        <a href="/#about">概要</a>
        <a class="active" href="/blog/">ブログ</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="blog-hero">
    <div class="container">
      <h1>ARIAブログ</h1>
      <p class="lead">楽曲制作の裏側や日々の思いを綴ります。</p>
    </div>
  </section>

  <!-- 一覧 -->
  <main class="blog-wrap container">
    <!-- フィーチャー（最新1件） -->
    <article id="feature" class="post feature" aria-live="polite">
      <!-- JSで挿入 -->
      <div class="card-skeleton" style="height:280px"></div>
    </article>

    <!-- グリッド（以降） -->
    <section id="grid" class="post-grid" aria-live="polite">
      <div class="card-skeleton"></div>
      <div class="card-skeleton"></div>
      <div class="card-skeleton"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2025 ARIA. All rights reserved.</p>
      <div class="social-links">
        <a href="https://x.com/NexusAria"><i class="fa-brands fa-twitter"></i></a>
        <a href="https://www.instagram.com/arianexus2/"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.youtube.com/@NexusAria"><i class="fa-brands fa-youtube"></i></a>
      </div>
    </div>
  </footer>

  <script>
  (async () => {
    const feature = document.getElementById('feature');
    const grid = document.getElementById('grid');

    async function load() {
      try {
        const r = await fetch('/blog/posts.json', { cache:'no-store' });
        if (r.ok) return r.json();
        throw 0;
      } catch {
        const r2 = await fetch('posts.json', { cache:'no-store' }).catch(()=>null);
        if (r2 && r2.ok) return r2.json();
        return [];
      }
    }

    const posts = await load();
    if (!Array.isArray(posts) || posts.length === 0) {
      feature.innerHTML = '<p>まだ記事がありません。</p>';
      grid.innerHTML = '';
      return;
    }

    // 日付降順
    const sorted = posts.slice().sort((a,b)=> new Date(b.date||0)-new Date(a.date||0));

    const latest = sorted[0];
    feature.innerHTML = `
      <a class="thumb" href="${latest.url}">
        <img src="${latest.cover}" alt="${latest.title}" loading="lazy" onerror="this.style.display='none'">
        <div class="thumb-fallback"></div>
      </a>
      <div class="content">
        <div class="meta">
          <span class="badge">${(latest.tags&&latest.tags[0])||'記事'}</span>
          <time datetime="${latest.date}">${latest.date.replace(/-/g,'/')}</time>
        </div>
        <h2><a href="${latest.url}">${latest.title}</a></h2>
        <p class="excerpt">${latest.excerpt||''}</p>
        <a class="btn ghost" href="${latest.url}">続きを読む</a>
      </div>
    `;

    const rest = sorted.slice(1);
    grid.innerHTML = rest.map(p=>`
      <article class="post card">
        <a class="thumb" href="${p.url}">
          <img src="${p.cover}" alt="${p.title}" loading="lazy" onerror="this.style.display='none'">
          <div class="thumb-fallback"></div>
        </a>
        <div class="content">
          <div class="meta"><span class="badge">${(p.tags&&p.tags[0])||'記事'}</span>
            <time datetime="${p.date}">${p.date.replace(/-/g,'/')}</time></div>
          <h3><a href="${p.url}">${p.title}</a></h3>
          <p class="excerpt">${p.excerpt||''}</p>
          <a class="readmore" href="${p.url}">続きを読む</a>
        </div>
      </article>
    `).join('');
  })();
  </script>
</body>
</html>
