<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARIA | ブログ</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="page-blog">
  <header class="navbar">
    <div class="container">
      <a class="logo" href="/">ARIA</a>
      <nav class="nav">
        <a href="/">ホーム</a>
        <a href="/#music">音楽</a>
        <a href="/#about">概要</a>
        <a class="active" href="/blog/">ブログ</a>
      </nav>
    </div>
  </header>

  <!-- Blog Hero -->
  <section class="blog-hero">
    <div class="container">
      <h1>ARIAブログ</h1>
      <p class="lead">楽曲制作の裏側や日々の思いを綴ります。</p>
    </div>
  </section>

  <!-- 一覧 -->
  <main class="blog-wrap container">
    <!-- フィーチャー（最新1件） -->
    <article id="feature" class="post feature" aria-live="polite">
      <div class="card-skeleton" style="height:280px"></div>
    </article>

    <!-- グリッド（以降のカード） -->
    <section id="grid" class="post-grid" aria-live="polite">
      <div class="card-skeleton"></div>
      <div class="card-skeleton"></div>
      <div class="card-skeleton"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2025 ARIA. All rights reserved.</p>
      <div class="social-links">
        <a href="https://x.com/NexusAria"><i class="fa-brands fa-twitter"></i></a>
        <a href="https://www.instagram.com/arianexus2/"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.youtube.com/@NexusAria"><i class="fa-brands fa-youtube"></i></a>
      </div>
    </div>
  </footer>

  <script>
  (async () => {
    const feature = document.getElementById('feature');
    const grid = document.getElementById('grid');

    // -------- utils: 絶対パス化・エスケープ ---------------------------------
    const toAbs = (url) => {
      if (!url) return '/blog/';
      if (/^https?:\/\//i.test(url)) return url;      // 既に http(s)
      if (url.startsWith('/')) return url;            // 既に絶対パス
      if (url.startsWith('blog/')) return '/' + url;  // blog/xxx → /blog/xxx
      if (!url.includes('/')) {                       // slugのみ → /blog/slug/
        const slug = url.replace(/\.html?$/,'');
        return '/blog/' + slug + (slug.endsWith('/') ? '' : '/');
      }
      return '/' + url.replace(/^\.?\//,'');          // それ以外はルート相対に
    };

    const absImg = (src) => {
      if (!src) return '/assets/images/noimage.png';
      if (/^https?:\/\//i.test(src)) return src;
      if (src.startsWith('/')) return src;
      return '/' + src.replace(/^\.?\//,'');
    };

    const esc = (s='') => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/"/g,'&quot;').replace(/>/g,'&gt;');

    const fDate = (iso='') => {
      try { return String(iso).replace(/-/g,'/'); } catch { return iso; }
    };

    // -------- posts.json 読み込み（ルート/相対の両対応） ---------------------
    async function load() {
      try {
        const r = await fetch('/blog/posts.json', { cache: 'no-store' });
        if (r.ok) return r.json();
        throw 0;
      } catch {
        const r2 = await fetch('posts.json', { cache: 'no-store' }).catch(()=>null);
        if (r2 && r2.ok) return r2.json();
        return [];
      }
    }

    const posts = await load();

    if (!Array.isArray(posts) || posts.length === 0) {
      feature.innerHTML = '<p>まだ記事がありません。</p>';
      grid.innerHTML = '';
      return;
    }

    // -------- 並び順：日付降順 ---------------------------------------------
    const sorted = posts.slice().sort((a,b)=> new Date(b.date||0) - new Date(a.date||0));

    // -------- フィーチャー（親 a で全体は包まない） -------------------------
    const latest = sorted[0];
    const latestUrl   = toAbs(latest.url || latest.permalink || latest.slug || '');
    const latestCover = absImg(latest.cover || latest.image);
    const latestTag   = (latest.tags && latest.tags[0]) ? latest.tags[0] : '記事';

    feature.innerHTML = `
      <a class="thumb" href="${latestUrl}">
        <img src="${latestCover}" alt="${esc(latest.title||'')}" loading="lazy" onerror="this.style.display='none'">
        <div class="thumb-fallback"></div>
      </a>
      <div class="content">
        <div class="meta"><span class="badge">${esc(latestTag)}</span>
          <time datetime="${esc(latest.date||'')}">${esc(fDate(latest.date||''))}</time></div>
        <h2><a href="${latestUrl}">${esc(latest.title||'')}</a></h2>
        <p class="excerpt">${esc(latest.excerpt||'')}</p>
        <a class="btn ghost" href="${latestUrl}">続きを読む</a>
      </div>
    `;

    // -------- 残りカード（各要素に個別リンク） ------------------------------
    const rest = sorted.slice(1);
    grid.innerHTML = rest.map(p => {
      const url   = toAbs(p.url || p.permalink || p.slug || '');
      const cover = absImg(p.cover || p.image);
      const tag   = (p.tags && p.tags[0]) ? p.tags[0] : '記事';
      return `
        <article class="post card">
          <a class="thumb" href="${url}">
            <img src="${cover}" alt="${esc(p.title||'')}" loading="lazy" onerror="this.style.display='none'">
            <div class="thumb-fallback"></div>
          </a>
          <div class="content">
            <div class="meta"><span class="badge">${esc(tag)}</span>
              <time datetime="${esc(p.date||'')}">${esc(fDate(p.date||''))}</time></div>
            <h3><a href="${url}">${esc(p.title||'')}</a></h3>
            <p class="excerpt">${esc(p.excerpt||'')}</p>
            <a class="readmore" href="${url}">続きを読む</a>
          </div>
        </article>
      `;
    }).join('');

    // -------- 防弾: 誤った onclick / data-href を無効化 ---------------------
    [feature, grid].forEach(root => {
      root.querySelectorAll('.post, .card, a.thumb, h2 a, h3 a, a.readmore, a.btn')
        .forEach(el => {
          el.onclick = null;
          el.removeAttribute('onclick');
          el.removeAttribute('data-href');
        });
    });
  })();
  </script>
</body>
</html>
