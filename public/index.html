<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARIA | 公式サイト</title>
  <meta name="description" content="一人で、千人分。— Dolby Atmos 時代のAIソロシンガー ARIA の公式サイト。最新リリース、歌詞、ストーリー、ブログ情報をお届けします。" />
  <link rel="canonical" href="https://arianexus.org/" />

  <!-- Language alternates -->
  <link rel="alternate" hreflang="ja" href="https://arianexus.org/"/>
  <link rel="alternate" hreflang="en" href="https://arianexus.org/en/"/>
  <link rel="alternate" hreflang="zh" href="https://arianexus.org/zh/"/>
  <link rel="alternate" hreflang="x-default" href="https://arianexus.org/"/>

  <!-- Preconnect/DNS Prefetch -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/style.css" />

  <!-- (任意) Google Analytics が必要ならIDを設定して有効化
  <script data-cfasync="false" async src="https://www.googletagmanager.com/gtag/js?id=G-3Z6FZB7SW7"></script>
  <script data-cfasync="false">
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3Z6FZB7SW7');
  </script>
  -->
</head>
<body class="body--cosmic">
  <!-- 共通ヘッダー（パーシャル） -->
  <div data-include="/partials/header.html"></div>

  <!-- ================= Main ================= -->
  <main class="container hero">
    <h1 class="hero-title">一人で、千人分。<span class="brand">ARIA</span></h1>
    <p class="muted">Dolby Atmos ネイティブのAIソロシンガー。多言語 × 7オクターブ × 立体フック。</p>

    <!-- Listen target（ヘッダーの「聴く」CTAがここへスクロール） -->
    <section id="listen" class="placeholder" aria-label="楽曲を聴く" style="margin-top:28px;">
      <!-- 埋め込みプレイヤーや配信リンク群を後で差し込む想定 -->
      <div class="card" style="padding:18px; border-radius:16px;">
        <div style="opacity:.9">（ここに YouTube / Spotify / Apple Music 等の埋め込みを配置）</div>
      </div>
    </section>

    <!-- ナビのアンカー用の薄いプレースホルダー群（後で各セクションを実装） -->
    <section id="music" class="placeholder" aria-label="楽曲" style="margin-top:56px;">
      <h2>楽曲</h2>
      <p class="muted">最新曲や人気曲をここに並べます。</p>
    </section>

    <section id="lyrics" class="placeholder" aria-label="歌詞" style="margin-top:56px;">
      <h2>歌詞</h2>
      <p class="muted">各曲の歌詞ページへ誘導します。</p>
    </section>

    <section id="story" class="placeholder" aria-label="ストーリー" style="margin-top:56px;">
      <h2>ストーリー</h2>
      <p class="muted">ARIA の世界観・設定・人物像などを深掘り。</p>
    </section>

    <section id="blog" class="placeholder" aria-label="ブログ" style="margin-top:56px;">
      <h2>ブログ</h2>
      <p class="muted">最新記事をここに表示。</p>
    </section>

    <section id="contact" class="placeholder" aria-label="お問い合わせ" style="margin-top:56px;">
      <h2>お問い合わせ</h2>
      <p class="muted">コラボや取材依頼などの窓口。</p>
    </section>
  </main>

  <!-- Scripts（パーシャル読込／既存のメインJS） -->
  <script src="/assets/js/includes.js" defer></script>
  <script src="/assets/js/main.js" defer></script>
  <noscript>JavaScript を有効にするとヘッダー等の共通部品が読み込まれます。</noscript>
</body>
</html>
